<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Google Sheet Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:Arial;
max-width:1200px;
margin:auto;
padding:20px;
}

.card{
padding:20px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:20px;
}

canvas{
max-height:400px;
}
</style>
</head>

<body>

<h1>📊 Google Sheet Dashboard</h1>

<div class="card">
<h3>Total Rows</h3>
<div id="count">Loading…</div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<script>

const csvURL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vT4moKnAjP3PbK0FB_OuX8EGONMfMCN1Qp9_cteII5VQdENjoRoHnc8FP3ZoqHar-KlxDFT_wO1Acwa/pub?gid=125785087&single=true&output=csv";

async function loadData(){

const text =
await fetch(csvURL).then(r=>r.text());

const rows =
text.split("\n")
.map(r=>r.split(","));

document.getElementById("count")
.innerHTML =
rows.length-1;

new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:["Rows"],
datasets:[
{
label:"Total Records",
data:[rows.length-1]
}
]
}
}
);

}

loadData();

</script>

</body>
</html>
